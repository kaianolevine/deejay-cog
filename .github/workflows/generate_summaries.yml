name: Generate Summaries
run-name: Generate Summaries (${{ github.event_name }})

on:
  workflow_dispatch:
  repository_dispatch:
    types: [generate-summary]

concurrency:
  group: dj-set-collection
  cancel-in-progress: false

jobs:
  run-script:
    runs-on: ubuntu-latest
    env:
      LOGGING_LEVEL: ${{ vars.LOGGING_LEVEL }}
      GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
      PREFECT_API_KEY: ${{ secrets.PREFECT_API_KEY }}
      PREFECT_API_URL: ${{ vars.PREFECT_API_URL }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Authenticate with Prefect Cloud
        run: |
          uv run prefect cloud login \
            --key ${{ secrets.PREFECT_API_KEY }} \
            --workspace ${{ vars.PREFECT_ACCOUNT_SLUG }}/${{ vars.PREFECT_WORKSPACE_SLUG }}

      - name: Run generate_summaries
        run: uv run python -u src/deejay_set_processor/generate_summaries.py
