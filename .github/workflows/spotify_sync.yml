name: Spotify sync
run-name: Spotify sync (${{ github.event_name }})

on:
  workflow_dispatch:
  repository_dispatch:
    types: [GoogleAppScript_SpotifySync]

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      LOGGING_LEVEL: ${{ vars.LOGGING_LEVEL }}
      SPOTIPY_CLIENT_ID: ${{ secrets.SPOTIPY_CLIENT_ID }}
      SPOTIPY_CLIENT_SECRET: ${{ secrets.SPOTIPY_CLIENT_SECRET }}
      SPOTIPY_REFRESH_TOKEN: ${{ secrets.SPOTIPY_REFRESH_TOKEN }}
      SPOTIPY_REDIRECT_URI: ${{ vars.SPOTIPY_REDIRECT_URI || 'http://127.0.0.1:8888/callback' }}
      GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
      SPOTIFY_RADIO_PLAYLIST_ID: ${{ vars.SPOTIFY_RADIO_PLAYLIST_ID }}
      VDJ_HISTORY_FOLDER_ID: ${{ vars.VDJ_HISTORY_FOLDER_ID }}
      SPOTIFY_PLAYLIST_SNAPSHOT_JSON_PATH: ${{ vars.SPOTIFY_PLAYLIST_SNAPSHOT_JSON_PATH || 'v1/spotify/spotify_playlists.json' }}
      KAIANO_API_REPO_TOKEN: ${{ secrets.KAIANO_API_REPO_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync

      - name: Run Spotify sync
        run: uv run python -m deejay_set_processor.spotify_sync

      - name: Checkout kaiano-api repo
        uses: actions/checkout@v4
        with:
          repository: kaianolevine/kaiano-api
          path: kaiano-api
          token: ${{ secrets.KAIANO_API_REPO_TOKEN }}

      - name: Copy playlist snapshot into kaiano-api
        run: |
          SNAPSHOT_PATH="${SPOTIFY_PLAYLIST_SNAPSHOT_JSON_PATH:-v1/spotify/spotify_playlists.json}"
          mkdir -p kaiano-api/src/json-site-data/spotify
          cp -f "$SNAPSHOT_PATH" kaiano-api/src/json-site-data/spotify/spotify_playlists.json

      - name: Commit and push kaiano-api (if changed)
        run: |
          cd kaiano-api
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/json-site-data/spotify/spotify_playlists.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update Spotify playlist snapshot JSON"
          git push
