name: Update DJ Set Collection
run-name: Update DJ Set Collection (${{ github.event_name }})

on:
  workflow_dispatch:
  repository_dispatch:
    types: [updated_dj_sets]

concurrency:
  group: dj-set-collection
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  run-script:
    runs-on: ubuntu-latest
    env:
      LOGGING_LEVEL: ${{ vars.LOGGING_LEVEL }}
      GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
      KAIANO_API_BASE_URL: ${{ vars.KAIANO_API_BASE_URL }}
      KAIANO_API_OWNER_ID: ${{ vars.KAIANO_API_OWNER_ID }}
      OWNER_ID: ${{ vars.OWNER_ID }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      STANDARDS_VERSION: "6.0"
      PREFECT_API_KEY: ${{ secrets.PREFECT_API_KEY }}
      PREFECT_API_URL: ${{ vars.PREFECT_API_URL }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Authenticate with Prefect Cloud
        run: |
          uv run prefect cloud login \
            --key ${{ secrets.PREFECT_API_KEY }} \
            --workspace ${{ vars.PREFECT_ACCOUNT_SLUG }}/${{ vars.PREFECT_WORKSPACE_SLUG }}

      - name: Run create_dj_set_collection
        run: uv run python -u src/deejay_set_processor/update_deejay_set_collection.py

      - name: Report failure to evaluator
        if: failure()
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          KAIANO_API_BASE_URL: ${{ vars.KAIANO_API_BASE_URL }}
        run: |
          uv run python -c "
          import os
          from pipeline_evaluator.evaluator import evaluate_pipeline_run
          evaluate_pipeline_run(
              run_id=os.environ.get('GITHUB_RUN_ID', 'unknown'),
              repo='deejay-set-processor-dev',
              flow_name='${{ github.workflow }}',
              sets_imported=0, sets_failed=0, sets_skipped=0,
              total_tracks=0, failed_set_labels=[],
              api_ingest_success=True, sets_attempted=0,
              collection_update=False,
              direct_finding_text='GitHub Actions step failed in: ${{ github.workflow }} (run ${{ github.run_id }})',
              direct_severity='ERROR',
          )
          "
