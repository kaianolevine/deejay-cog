name: deejay-cog
prefect-version: 3.4.0

build: null
push: null

pull:
  - prefect.deployments.steps.git_clone:
      id: clone-step
      repository: https://github.com/mini-app-polis/deejay-cog.git
      branch: main

deployments:
  - name: process-new-files
    entrypoint: src/deejay_cog/process_new_files.py:process_new_csv_files_flow
    work_pool:
      name: managed-pool
      job_variables:
        pip_packages:
          - "git+https://github.com/mini-app-polis/common-python-utils.git@main"
          - "git+https://github.com/mini-app-polis/evaluator-cog.git@main"
          - "git+https://github.com/mini-app-polis/deejay-cog.git@main"

  - name: update-deejay-set-collection
    entrypoint: src/deejay_cog/update_deejay_set_collection.py:generate_dj_set_collection
    work_pool:
      name: managed-pool
      job_variables:
        pip_packages:
          - "git+https://github.com/mini-app-polis/common-python-utils.git@main"
          - "git+https://github.com/mini-app-polis/evaluator-cog.git@main"
          - "git+https://github.com/mini-app-polis/deejay-cog.git@main"

  - name: generate-summaries
    entrypoint: src/deejay_cog/generate_summaries.py:generate_summaries_flow
    work_pool:
      name: managed-pool
      job_variables:
        pip_packages:
          - "git+https://github.com/mini-app-polis/common-python-utils.git@main"
          - "git+https://github.com/mini-app-polis/evaluator-cog.git@main"
          - "git+https://github.com/mini-app-polis/deejay-cog.git@main"

  - name: ingest-live-history
    entrypoint: src/deejay_cog/ingest_live_history.py:ingest_live_history
    work_pool:
      name: managed-pool
      job_variables:
        pip_packages:
          - "git+https://github.com/mini-app-polis/common-python-utils.git@main"
          - "git+https://github.com/mini-app-polis/evaluator-cog.git@main"
          - "git+https://github.com/mini-app-polis/deejay-cog.git@main"